<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รายงาน ME 2569 — Live Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06090f;
  --surface: #0b1017;
  --card: #0f1923;
  --card2: #121e2a;
  --border: #1a2d3f;
  --accent: #00d9ff;
  --accent2: #ff6b35;
  --accent3: #a855f7;
  --green: #22c55e;
  --yellow: #eab308;
  --red: #ef4444;
  --text: #e2eaf4;
  --muted: #64748b;
  --mono: 'IBM Plex Mono', monospace;
  --body: 'Sarabun', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  min-height: 100vh;
}

/* Scanline */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 3px,
    rgba(0,217,255,0.012) 3px, rgba(0,217,255,0.012) 4px
  );
  pointer-events: none;
  z-index: 999;
}

.wrap { max-width: 1440px; margin: 0 auto; padding: 20px 24px; }

/* ── HEADER ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px;
  background: var(--card);
  border: 1px solid var(--border);
  border-top: 2px solid var(--accent);
  margin-bottom: 20px;
  flex-wrap: wrap; gap: 12px;
}
.h-left { display: flex; align-items: center; gap: 14px; }
.logo {
  font-family: var(--mono);
  font-size: 15px; font-weight: 700;
  color: var(--accent);
  letter-spacing: .12em;
  text-transform: uppercase;
}
.logo small { color: var(--muted); font-weight: 400; display: block; font-size: 9px; margin-top: 1px; letter-spacing: .1em; }
.badge {
  display: flex; align-items: center; gap: 5px;
  padding: 3px 9px;
  border: 1px solid rgba(34,197,94,.35);
  background: rgba(34,197,94,.07);
  font-family: var(--mono); font-size: 10px; font-weight: 700;
  color: var(--green); letter-spacing: .15em; text-transform: uppercase;
}
.dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: blink 1.4s ease-in-out infinite; }
@keyframes blink { 50% { opacity:.3; transform:scale(.8); } }

.h-right { display: flex; align-items: center; gap: 16px; }
.timestamp { font-family: var(--mono); font-size: 11px; color: var(--muted); }
.timestamp strong { color: var(--accent); }
.progress-wrap { width: 120px; }
.progress-label { font-family: var(--mono); font-size: 9px; color: var(--muted); margin-bottom: 3px; text-align: right; }
.progress-track { height: 2px; background: var(--border); overflow: hidden; }
.progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent3)); transition: width 1s linear; }

/* ── ALERT / ERROR ── */
.alert {
  padding: 14px 18px; margin-bottom: 18px;
  border-left: 3px solid var(--accent2);
  background: rgba(255,107,53,.07); border: 1px solid rgba(255,107,53,.3);
  font-size: 13px; line-height: 1.7; display: none;
}
.alert.show { display: block; }
.alert strong { color: var(--accent2); display: block; margin-bottom: 6px; font-size: 12px; text-transform: uppercase; letter-spacing: .1em; }
.alert code { font-family: var(--mono); font-size: 11px; background: rgba(0,217,255,.1); color: var(--accent); padding: 1px 5px; }

/* ── KPI ── */
.kpi-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 12px; margin-bottom: 20px; }
.kpi {
  background: var(--card); border: 1px solid var(--border);
  padding: 16px 18px; position: relative; overflow: hidden;
  transition: border-color .25s, transform .2s;
  animation: up .4s ease both;
}
.kpi:hover { border-color: var(--accent); transform: translateY(-3px); }
@keyframes up { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
.kpi::before { content:''; position:absolute; top:0;left:0;right:0;height:2px; background:linear-gradient(90deg,var(--accent),transparent); }
.kpi:nth-child(2)::before { background:linear-gradient(90deg,var(--accent2),transparent); }
.kpi:nth-child(3)::before { background:linear-gradient(90deg,var(--green),transparent); }
.kpi:nth-child(4)::before { background:linear-gradient(90deg,var(--yellow),transparent); }
.kpi:nth-child(5)::before { background:linear-gradient(90deg,var(--accent3),transparent); }
.kpi-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .15em; color: var(--muted); margin-bottom: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.kpi-val { font-family: var(--mono); font-size: 28px; font-weight: 700; line-height: 1; color: var(--text); }
.kpi:nth-child(2) .kpi-val { color: var(--accent2); }
.kpi:nth-child(3) .kpi-val { color: var(--green); }
.kpi:nth-child(4) .kpi-val { color: var(--yellow); }
.kpi:nth-child(5) .kpi-val { color: var(--accent3); }
.kpi-sub { font-family: var(--mono); font-size: 9px; color: var(--muted); margin-top: 5px; }

/* ── CHARTS GRID ── */
.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.chart-card { background: var(--card); border: 1px solid var(--border); padding: 18px; }
.chart-card.span2 { grid-column: 1 / -1; }
@media(max-width:780px){ .charts-grid { grid-template-columns: 1fr; } .chart-card.span2 { grid-column: unset; } }
.cc-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.cc-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .15em; color: var(--muted); }
.cc-badge { font-family: var(--mono); font-size: 9px; padding: 2px 7px; border: 1px solid var(--border); color: var(--muted); }
.col-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.pill {
  font-family: var(--mono); font-size: 9px; font-weight: 600;
  padding: 3px 9px; background: transparent; border: 1px solid var(--border);
  color: var(--muted); cursor: pointer; text-transform: uppercase; letter-spacing: .1em;
  transition: all .2s;
}
.pill:hover, .pill.on { border-color: var(--accent); color: var(--accent); background: rgba(0,217,255,.07); }
.chart-box { position: relative; height: 230px; }
.chart-box.tall { height: 280px; }

/* ── TABLE ── */
.table-card { background: var(--card); border: 1px solid var(--border); margin-bottom: 20px; }
.tc-head { display: flex; align-items: center; justify-content: space-between; padding: 13px 18px; border-bottom: 1px solid var(--border); }
.tc-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .15em; color: var(--muted); }
.tc-count { font-family: var(--mono); font-size: 11px; color: var(--accent); }
.search-wrap { padding: 10px 18px; border-bottom: 1px solid var(--border); }
.search-input {
  width: 100%; max-width: 320px;
  background: var(--bg); border: 1px solid var(--border); color: var(--text);
  font-family: var(--body); font-size: 12px; padding: 7px 12px;
  outline: none; transition: border-color .2s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--muted); }
.tbl-wrap { overflow-x: auto; max-height: 420px; overflow-y: auto; }
.tbl-wrap::-webkit-scrollbar { width: 4px; height: 4px; }
.tbl-wrap::-webkit-scrollbar-thumb { background: var(--border); }
table { width: 100%; border-collapse: collapse; }
thead th {
  position: sticky; top: 0;
  padding: 9px 12px;
  background: rgba(0,217,255,.05);
  border-bottom: 1px solid var(--border);
  font-family: var(--mono); font-size: 9px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .1em; color: var(--accent);
  text-align: left; white-space: nowrap; cursor: pointer; user-select: none;
}
thead th:hover { color: var(--text); }
thead th.sorted-asc::after { content: ' ↑'; }
thead th.sorted-desc::after { content: ' ↓'; }
tbody tr { border-bottom: 1px solid rgba(26,45,63,.5); transition: background .15s; }
tbody tr:hover { background: rgba(0,217,255,.04); }
td { padding: 8px 12px; font-size: 12px; white-space: nowrap; color: var(--text); }
td.num { font-family: var(--mono); font-size: 11px; text-align: right; }
.tag {
  display: inline-block; padding: 1px 7px;
  font-family: var(--mono); font-size: 10px;
  border-radius: 2px;
}

/* ── LOADING ── */
.loader {
  position: fixed; inset: 0;
  background: var(--bg); z-index: 500;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
}
.loader.gone { display: none; }
.spin { width: 44px; height: 44px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: rot .7s linear infinite; }
@keyframes rot { to { transform: rotate(360deg); } }
.load-text { font-family: var(--mono); font-size: 12px; color: var(--muted); letter-spacing: .15em; }

.footer { text-align: center; padding: 14px; font-family: var(--mono); font-size: 9px; color: rgba(100,116,139,.35); letter-spacing: .15em; text-transform: uppercase; }

/* No data */
.no-data { padding: 40px; text-align: center; font-family: var(--mono); font-size: 12px; color: var(--muted); }
</style>
</head>
<body>

<div class="loader" id="loader">
  <div class="spin"></div>
  <div class="load-text">LOADING SHEET DATA...</div>
</div>

<div class="wrap">
  <div class="header">
    <div class="h-left">
      <div>
        <div class="logo">รายงาน ME 2569 <small>LIVE DASHBOARD</small></div>
      </div>
      <div class="badge"><div class="dot"></div>REALTIME</div>
    </div>
    <div class="h-right">
      <div class="timestamp">อัปเดต: <strong id="ts">--:--:--</strong></div>
      <div class="progress-wrap">
        <div class="progress-label" id="countdown">30s</div>
        <div class="progress-track"><div class="progress-bar" id="pbar"></div></div>
      </div>
    </div>
  </div>

  <div class="alert" id="alertBox">
    <strong>⚠ ไม่สามารถโหลดข้อมูลได้</strong>
    <span id="alertMsg">กรุณาตรวจสอบ</span>
  </div>

  <div class="kpi-row" id="kpiRow"></div>

  <div class="charts-grid" id="chartsGrid">
    <div class="chart-card">
      <div class="cc-head"><span class="cc-title">📊 Bar Chart</span><span class="cc-badge" id="barBadge">—</span></div>
      <div class="col-pills" id="barPills"></div>
      <div class="chart-box"><canvas id="cBar"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="cc-head"><span class="cc-title">📈 Line Chart</span><span class="cc-badge" id="lineBadge">—</span></div>
      <div class="col-pills" id="linePills"></div>
      <div class="chart-box"><canvas id="cLine"></canvas></div>
    </div>
    <div class="chart-card span2">
      <div class="cc-head"><span class="cc-title">🥧 Donut Chart</span><span class="cc-badge" id="pieBadge">—</span></div>
      <div class="col-pills" id="piePills"></div>
      <div class="chart-box tall"><canvas id="cPie"></canvas></div>
    </div>
  </div>

  <div class="table-card">
    <div class="tc-head">
      <span class="tc-title">📋 ข้อมูลทั้งหมด</span>
      <span class="tc-count" id="rowCount">0 แถว</span>
    </div>
    <div class="search-wrap">
      <input class="search-input" id="searchBox" placeholder="🔍 ค้นหาข้อมูล..." oninput="filterTable()">
    </div>
    <div class="tbl-wrap">
      <table><thead id="tHead"></thead><tbody id="tBody"></tbody></table>
    </div>
  </div>

  <div class="footer">
    SHEET ID: 10zcbjGFAFmTh_1EbZl8Z4d1GR_G2LWwz6FXK6u0ackU &nbsp;|&nbsp; AUTO REFRESH 30s &nbsp;|&nbsp; GITHUB PAGES
  </div>
</div>

<script>
// ══════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════
const SHEET_ID  = '10zcbjGFAFmTh_1EbZl8Z4d1GR_G2LWwz6FXK6u0ackU';
const INTERVAL  = 30; // seconds
// Use gviz endpoint — better CORS support for public sheets
const DATA_URL  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Sheet1`;

// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
let headers = [], rows = [], allRows = [];
let numCols = [], txtCols = [];
let selBar, selLine, selPie;
let chartBar, chartLine, chartPie;
let sortCol = -1, sortDir = 1;
let refreshLoop, countLoop, elapsed = 0;

// ══════════════════════════════════════════════════
// COLORS
// ══════════════════════════════════════════════════
const COLORS = [
  '#00d9ff','#ff6b35','#22c55e','#eab308','#a855f7',
  '#ec4899','#3b82f6','#10b981','#f97316','#ef4444',
  '#06b6d4','#84cc16','#8b5cf6','#f59e0b','#14b8a6',
];
const rgba = (hex, a=0.8) => {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
};

// ══════════════════════════════════════════════════
// PARSE CSV
// ══════════════════════════════════════════════════
function parseCSV(txt) {
  const lines = txt.trim().split('\n');
  function parseRow(line) {
    const res = []; let cur = '', q = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { q = !q; }
      else if (c === ',' && !q) { res.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    res.push(cur.trim());
    return res;
  }
  const hdrs = parseRow(lines[0]);
  const data = lines.slice(1).map(l => parseRow(l)).filter(r => r.some(c => c !== ''));
  return { headers: hdrs, rows: data };
}

function detectCols(hdrs, rows) {
  const num = [], txt = [];
  hdrs.forEach((h, i) => {
    const vals = rows.map(r => r[i]).filter(v => v !== '');
    const n = vals.filter(v => !isNaN(v.replace(/,/g,'').replace(/\s/g,''))).length;
    if (n > vals.length * 0.55) num.push(i);
    else txt.push(i);
  });
  return { num, txt };
}

// ══════════════════════════════════════════════════
// FORMAT
// ══════════════════════════════════════════════════
function fmt(n) {
  if (isNaN(n)) return '—';
  if (Math.abs(n) >= 1e9) return (n/1e9).toFixed(1)+'B';
  if (Math.abs(n) >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (Math.abs(n) >= 1e3) return (n/1e3).toFixed(1)+'K';
  return Number.isInteger(n) ? n.toLocaleString() : n.toFixed(2);
}

// ══════════════════════════════════════════════════
// KPI
// ══════════════════════════════════════════════════
function renderKPI() {
  const el = document.getElementById('kpiRow');
  el.innerHTML = '';
  const cols = numCols.length ? numCols.slice(0,6) : [];
  if (!cols.length) {
    el.innerHTML = `<div class="kpi"><div class="kpi-label">จำนวนแถว</div><div class="kpi-val">${rows.length}</div><div class="kpi-sub">total rows</div></div>`;
    return;
  }
  cols.forEach((ci, idx) => {
    const vals = rows.map(r => parseFloat((r[ci]||'0').replace(/,/g,'').replace(/\s/g,''))).filter(v => !isNaN(v));
    const total = vals.reduce((a,b)=>a+b,0);
    const avg   = vals.length ? total/vals.length : 0;
    const max   = vals.length ? Math.max(...vals) : 0;
    const d = document.createElement('div');
    d.className = 'kpi';
    d.style.animationDelay = idx*0.07+'s';
    d.innerHTML = `<div class="kpi-label">${headers[ci]}</div>
      <div class="kpi-val">${fmt(total)}</div>
      <div class="kpi-sub">avg ${fmt(avg)} &nbsp;| max ${fmt(max)}</div>`;
    el.appendChild(d);
  });
  // Row count card
  const d = document.createElement('div');
  d.className = 'kpi';
  d.style.animationDelay = cols.length*0.07+'s';
  d.innerHTML = `<div class="kpi-label">จำนวนแถว</div><div class="kpi-val">${rows.length}</div><div class="kpi-sub">total records</div>`;
  el.appendChild(d);
}

// ══════════════════════════════════════════════════
// CHART HELPERS
// ══════════════════════════════════════════════════
const BASE_OPT = {
  responsive: true, maintainAspectRatio: false,
  plugins: {
    legend: { labels: { color:'#64748b', font:{family:"'IBM Plex Mono',monospace",size:10}, boxWidth:10 } },
    tooltip: {
      backgroundColor:'#0f1923', borderColor:'#1a2d3f', borderWidth:1,
      titleColor:'#00d9ff', bodyColor:'#e2eaf4',
      titleFont:{family:"'IBM Plex Mono',monospace",size:11},
      bodyFont:{family:"'IBM Plex Mono',monospace",size:11},
    }
  },
  scales: {
    x: { ticks:{color:'#64748b',font:{family:"'IBM Plex Mono',monospace",size:9},maxRotation:45}, grid:{color:'rgba(26,45,63,.7)'} },
    y: { ticks:{color:'#64748b',font:{family:"'IBM Plex Mono',monospace",size:9}}, grid:{color:'rgba(26,45,63,.7)'} }
  }
};

function sumBy(labelCI, valueCI, limit=20) {
  const map = {};
  rows.forEach(r => {
    const key = r[labelCI]?.trim() || 'N/A';
    const v = parseFloat((r[valueCI]||'0').replace(/,/g,'').replace(/\s/g,'')) || 0;
    map[key] = (map[key]||0) + v;
  });
  return Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,limit);
}

function makePills(containerId, cols, selected, onChange) {
  const c = document.getElementById(containerId);
  c.innerHTML = '';
  cols.forEach(ci => {
    const b = document.createElement('button');
    b.className = 'pill' + (ci===selected?' on':'');
    b.textContent = headers[ci];
    b.onclick = () => onChange(ci);
    c.appendChild(b);
  });
}

// ── BAR ──
function drawBar(ci) {
  selBar = ci;
  const lblCI = txtCols.length ? txtCols[0] : 0;
  const entries = sumBy(lblCI, ci);
  const labels = entries.map(e=>e[0]);
  const vals   = entries.map(e=>e[1]);
  document.getElementById('barBadge').textContent = headers[ci];
  makePills('barPills', numCols, ci, c => drawBar(c));
  if (chartBar) chartBar.destroy();
  chartBar = new Chart(document.getElementById('cBar'), {
    type: 'bar',
    data: { labels, datasets:[{ label:headers[ci], data:vals, backgroundColor:labels.map((_,i)=>rgba(COLORS[i%COLORS.length],.75)), borderColor:labels.map((_,i)=>COLORS[i%COLORS.length]), borderWidth:1, borderRadius:3 }] },
    options: { ...JSON.parse(JSON.stringify(BASE_OPT)) }
  });
}

// ── LINE ──
function drawLine(ci) {
  selLine = ci;
  const lblCI = txtCols.length ? txtCols[0] : null;
  const maxRows = 60;
  const labels = rows.slice(0,maxRows).map((r,i) => lblCI!==null ? (r[lblCI]||i+1) : i+1);
  const vals   = rows.slice(0,maxRows).map(r => parseFloat((r[ci]||'0').replace(/,/g,'').replace(/\s/g,''))||0);
  document.getElementById('lineBadge').textContent = headers[ci];
  makePills('linePills', numCols, ci, c => drawLine(c));
  if (chartLine) chartLine.destroy();
  chartLine = new Chart(document.getElementById('cLine'), {
    type: 'line',
    data: { labels, datasets:[{ label:headers[ci], data:vals, borderColor:'#00d9ff', backgroundColor:'rgba(0,217,255,.07)', fill:true, tension:.35, pointRadius:2, pointBackgroundColor:'#00d9ff', borderWidth:2 }] },
    options: { ...JSON.parse(JSON.stringify(BASE_OPT)) }
  });
}

// ── PIE ──
function drawPie(ci) {
  selPie = ci;
  const lblCI = txtCols.length ? txtCols[0] : 0;
  const entries = sumBy(lblCI, ci, 12);
  const labels = entries.map(e=>e[0]);
  const vals   = entries.map(e=>e[1]);
  document.getElementById('pieBadge').textContent = headers[ci];
  makePills('piePills', numCols, ci, c => drawPie(c));
  if (chartPie) chartPie.destroy();
  chartPie = new Chart(document.getElementById('cPie'), {
    type: 'doughnut',
    data: { labels, datasets:[{ data:vals, backgroundColor:labels.map((_,i)=>rgba(COLORS[i%COLORS.length],.8)), borderColor:labels.map((_,i)=>COLORS[i%COLORS.length]), borderWidth:1, hoverOffset:10 }] },
    options: {
      responsive:true, maintainAspectRatio:false, cutout:'52%',
      plugins: {
        legend:{ position:'right', labels:{color:'#64748b',font:{family:"'IBM Plex Mono',monospace",size:10},boxWidth:10,padding:14} },
        tooltip: BASE_OPT.plugins.tooltip
      }
    }
  });
}

// ══════════════════════════════════════════════════
// TABLE
// ══════════════════════════════════════════════════
function renderTable(data) {
  const head = document.getElementById('tHead');
  const body = document.getElementById('tBody');
  document.getElementById('rowCount').textContent = `${data.length} แถว`;
  head.innerHTML = '<tr>' + headers.map((h,i) =>
    `<th onclick="sortBy(${i})" class="${sortCol===i?(sortDir===1?'sorted-asc':'sorted-desc'):''}">${h}</th>`
  ).join('') + '</tr>';
  body.innerHTML = data.slice(0,1000).map(r =>
    '<tr>' + r.map((cell,ci) => {
      const isN = numCols.includes(ci);
      return `<td class="${isN?'num':''}">${cell}</td>`;
    }).join('') + '</tr>'
  ).join('');
}

function filterTable() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  const filtered = q ? allRows.filter(r => r.some(c => c.toLowerCase().includes(q))) : allRows;
  rows = filtered;
  renderTable(filtered);
}

function sortBy(ci) {
  if (sortCol === ci) sortDir *= -1;
  else { sortCol = ci; sortDir = 1; }
  allRows.sort((a,b) => {
    const av = a[ci], bv = b[ci];
    const an = parseFloat(av), bn = parseFloat(bv);
    if (!isNaN(an) && !isNaN(bn)) return (an-bn)*sortDir;
    return av.localeCompare(bv, 'th') * sortDir;
  });
  filterTable();
}

// ══════════════════════════════════════════════════
// FETCH & RENDER
// ══════════════════════════════════════════════════
async function fetchAndRender() {
  try {
    const url = DATA_URL + '&nocache=' + Date.now();
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    if (text.includes('<html') || text.includes('Sign in') || text.trim().length < 10)
      throw new Error('Sheet ยังไม่ได้เปิด Public หรือ Sheet ID ไม่ถูกต้อง');

    const parsed = parseCSV(text);
    headers  = parsed.headers;
    allRows  = parsed.rows;
    rows     = [...allRows];
    const det = detectCols(headers, rows);
    numCols  = det.num;
    txtCols  = det.txt;

    document.getElementById('alertBox').classList.remove('show');
    document.getElementById('loader').classList.add('gone');
    document.getElementById('ts').textContent = new Date().toLocaleTimeString('th-TH');

    renderKPI();

    if (numCols.length > 0) {
      document.getElementById('chartsGrid').style.display = '';
      if (!numCols.includes(selBar))  selBar  = numCols[0];
      if (!numCols.includes(selLine)) selLine = numCols[Math.min(1, numCols.length-1)];
      if (!numCols.includes(selPie))  selPie  = numCols[0];
      drawBar(selBar);
      drawLine(selLine);
      drawPie(selPie);
    } else {
      document.getElementById('chartsGrid').style.display = 'none';
    }

    renderTable(rows);

  } catch (e) {
    document.getElementById('loader').classList.add('gone');
    document.getElementById('alertBox').classList.add('show');
    document.getElementById('alertMsg').textContent = e.message;
    console.error(e);
  }
}

// ══════════════════════════════════════════════════
// TIMER
// ══════════════════════════════════════════════════
function startCountdown() {
  clearInterval(countLoop);
  elapsed = 0;
  document.getElementById('pbar').style.width = '0%';
  countLoop = setInterval(() => {
    elapsed++;
    const pct = (elapsed / INTERVAL) * 100;
    document.getElementById('pbar').style.width = pct + '%';
    document.getElementById('countdown').textContent = (INTERVAL - elapsed) + 's';
    if (elapsed >= INTERVAL) {
      fetchAndRender();
      elapsed = 0;
    }
  }, 1000);
}

// ══════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════
fetchAndRender();
startCountdown();
</script>
